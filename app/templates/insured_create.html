<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פרטי מבוטח</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap3-dialog@1.35.4/dist/css/bootstrap-dialog.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap3-dialog@1.35.4/dist/js/bootstrap-dialog.min.js"></script>

  <script src="/static/assets/js/functions.js"></script>

  <style>
    .card { border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .photo-preview { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; }
  </style>
</head>
<body class="container mt-4">

  <h3 class="mb-4">
  {% if insured %}עדכן תיק חקירה{% else %}פתח תיק חקירה{% endif %}
  </h3>

<form id="insuredCreateForm" method="POST" action="{{ url_for('main.create_insured') }}" enctype="multipart/form-data">
  <div class="row g-4">

    <!-- RIGHT: Main Form -->
    <div class="col-md-8 order-md-1">
      <div class="card p-3">
        <div class="text-center">
          {% if insured and insured.photo %}
            <img src="{{ url_for('static', filename='uploads/insured_photos/' ~ insured.photo) }}" class="photo-preview mb-3" id="photoPreview">
          {% else %}
            <img src="/static/img/default_avatar.png" class="photo-preview mb-3" id="photoPreview">
          {% endif %}
          <input type="file" name="photo" class="form-control" onchange="previewPhoto(event)">
        </div>
        <hr>

        <!-- Personal fields -->
        <div class="mb-2"><label>שם פרטי</label><input type="text" class="form-control" name="first_name" required></div>
        <div class="mb-2"><label>שם משפחה</label><input type="text" class="form-control" name="last_name" required></div>

        <div class="mb-2">
          <label for="gender" class="form-label">מין</label>
          <select class="form-select" id="gender" name="gender" required>
            <option value="זכר" {% if not insured or insured.gender == 'זכר' %}selected{% endif %}>זכר</option>
            <option value="נקבה" {% if insured and insured.gender == 'נקבה' %}selected{% endif %}>נקבה</option>
          </select>
        </div>

        <div class="mb-2"><label>תעודת זהות</label><input type="text" class="form-control" name="id_number" required></div>

        <div class="mb-2">
          <label for="birth_date" class="form-label">תאריך לידה</label>
          <input type="date" id="birth_date" class="form-control" name="birth_date" value="{{ insured.birth_date.strftime('%Y-%m-%d') if insured and insured.birth_date else '' }}">
        </div>

        <div class="mb-2"><label>שם אב</label><input type="text" class="form-control" name="father_name"></div>
        <div class="mb-2"><label>עיר</label><input type="text" class="form-control" name="city"></div>
        <div class="mb-2"><label>כתובת</label><input type="text" class="form-control" name="address"></div>
        <div class="mb-2"><label>טלפון</label><input type="text" class="form-control" name="phone"></div>
        <div class="mb-2"><label>קופה</label><input type="text" class="form-control" name="koopa"></div>
        <div class="mb-2"><label>מרפאה</label><input type="text" class="form-control" name="clinic"></div>

        <div class="mb-2">
          <label for="insurance" class="form-label">ביטוח</label>
          <select id="insurance" name="insurance" class="form-select" required>
            <option value="הפניקס" {% if not insured or insured.insurance == 'הפניקס' %}selected{% endif %}>הפניקס</option>
            <option value="מנורה" {% if insured and insured.insurance == 'מנורה' %}selected{% endif %}>מנורה</option>
            <option value="שלמה" {% if insured and insured.insurance == 'שלמה' %}selected{% endif %}>שלמה</option>
            <option value="איילון" {% if insured and insured.insurance == 'איילון' %}selected{% endif %}>איילון</option>
          </select>
        </div>

        <div class="mb-2">
          <label for="claim_type" class="form-label">סוג תביעה</label>
          <select id="claim_type" name="claim_type" class="form-select" required>
            <option value="">בחר סוג תביעה</option>
            <option value="סיעוד" {% if insured and insured.claim_type == 'סיעוד' %}selected{% endif %}>סיעוד</option>
            <option value="אכא" {% if insured and insured.claim_type == 'אכא' %}selected{% endif %}>אכא</option>
            <option value="פרטי" {% if insured and insured.claim_type == 'פרטי' %}selected{% endif %}>פרטי</option>
            <option value="מסחרי" {% if insured and insured.claim_type == 'מסחרי' %}selected{% endif %}>מסחרי</option>
          </select>
        </div>

        <div class="d-grid mt-3">
          <button type="button" id="submitCreateInsuredBtn" class="btn btn-success">שמור</button>
          <a href="{{ url_for('main.admin_insured') }}" class="btn btn-secondary mt-2">חזור</a>
        </div>
      </div>
    </div>

    <!-- LEFT: Claim Details Card -->
    <div class="col-md-4 order-md-2">
      <div class="card p-3" id="claimDetailsCard" style="display:none;">
        <h5 class="card-title">פרטי תביעה</h5>

        <div class="mb-3">
          <label for="received_date" class="form-label">תאריך קבלה</label>
          <input type="date" class="form-control" id="received_date" name="received_date">
        </div>

        <div class="mb-3">
          <label for="claim_number" class="form-label">מספר תביעה</label>
          <input type="text" class="form-control" id="claim_number" name="claim_number">
        </div>

        <div class="mb-3">
          <label for="claim_status" class="form-label">סטטוס תביעה</label>
          <select class="form-select" id="claim_status" name="claim_status">
            <option value="">בחר סטטוס תביעה</option>
            <option value="פתוחה">פתוחה</option>
            <option value="הושלמה">הושלמה</option>
          </select>
        </div>


        <div class="mb-3">
          <label for="claim_notes" class="form-label">הערות</label>
          <textarea class="form-control" id="claim_notes" name="claim_notes"></textarea>
        </div>
      </div>
    </div>



  </div>
</form>



<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap3-dialog/1.34.9/css/bootstrap-dialog.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap3-dialog/1.34.9/js/bootstrap-dialog.min.js"></script>

<script>
$(document).ready(function () {
    $('#submitCreateInsuredBtn').on('click', function () {
        var form = $('#insuredCreateForm')[0];
        var formData = new FormData(form);

        $.ajax({
            url: $('#insuredCreateForm').attr('action'),
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function (response) {
                showCustomModal('הצלחה', response.message || 'המבוטח נוצר בהצלחה');
            },
            error: function (xhr) {
                  let errorMsg = xhr.responseJSON?.message || 'אירעה שגיאה ביצירת המבוטח';
                  showCustomModal('שגיאה', errorMsg);
            }
        });
    });
});
</script>

<script>
  function previewPhoto(event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        const preview = document.getElementById('photoPreview');
        preview.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
  }

  function showCustomModal(title, message) {
    document.getElementById('customModalLabel').innerText = title;
    document.getElementById('customModalBody').innerText = message;

    const modal = new bootstrap.Modal(document.getElementById('customModal'), {
      keyboard: true
    });
    modal.show();
  }

  document.addEventListener("DOMContentLoaded", function () {
  const claimTypeSelect = document.getElementById("claim_type");
  const claimCard = document.getElementById("claimDetailsCard");

  // Initial check if editing an insured with existing claim type
  if (claimTypeSelect.value === "סיעוד" || claimTypeSelect.value === "אכא") {
    claimCard.style.display = "block";
  }

  claimTypeSelect.addEventListener("change", function () {
    const selectedValue = this.value.trim();
    if (selectedValue === "סיעוד" || selectedValue === "אכא") {
      claimCard.style.display = "block";
    } else {
      claimCard.style.display = "none";
      document.getElementById("received_date").value = "";
      document.getElementById("claim_number").value = "";
      document.getElementById("claim_status").value = "פתוחה";
      document.getElementById("claim_notes").value = "";
    }
  });
});


  //log activity
    $(".btn").on("click", function () {
        // Get the text of the clicked button
        const buttonText = $(this).text().trim();

        // Get the current file name without the ".html" postfix
        const fileName = window.location.pathname.split("/").pop().replace(".html", "");

        // Create a combined activity description
        const activityDescription = `${fileName}: ${buttonText}`;

        console.log("clicking on ",activityDescription);

        // Call the logUserActivity function with the combined description
        logUserActivity(activityDescription);
    });
</script>

<!-- ✅ Custom Modal -->
<div class="modal fade" id="customModal" tabindex="-1" aria-labelledby="customModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow">
      <div class="modal-header">
        <h5 class="modal-title" id="customModalLabel">כותרת</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="סגור"></button>
      </div>
      <div class="modal-body" id="customModalBody">
        תוכן
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">סגור</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
