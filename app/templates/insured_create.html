<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פרטי מבוטח</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    .card { border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .photo-preview { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; }
  </style>
</head>
<body class="container mt-4">

  <h3 class="mb-4">
  {% if insured %}עדכן פרטי מבוטח{% else %}צור תיק מבוטח{% endif %}
  </h3>

 <form method="POST" enctype="multipart/form-data">
  <div class="row g-4">
    <!-- LEFT: Form (4 columns) -->
    <div class="col-md-4">
      <div class="card p-3">
        <div class="text-center">
          {% if insured and insured.photo %}
            <img src="{{ url_for('static', filename='uploads/insured_photos/' ~ insured.photo) }}" class="photo-preview mb-3" id="photoPreview">
          {% else %}
            <img src="/static/img/default_avatar.png" class="photo-preview mb-3" id="photoPreview">
          {% endif %}
          <input type="file" name="photo" class="form-control" onchange="previewPhoto(event)">
        </div>
        <hr>
        <!-- Personal fields -->
        <div class="mb-2"><label>שם פרטי</label><input type="text" class="form-control" name="first_name" required></div>
        <div class="mb-2"><label>שם משפחה</label><input type="text" class="form-control" name="last_name" required></div>
        <div class="mb-2">
          <label for="gender" class="form-label">מין</label>
          <select class="form-select" id="gender" name="gender" required>
            <option value="זכר" {% if not insured or insured.gender == 'זכר' %}selected{% endif %}>זכר</option>
            <option value="נקבה" {% if insured and insured.gender == 'נקבה' %}selected{% endif %}>נקבה</option>
          </select>
        </div>
        <div class="mb-2"><label>תעודת זהות</label><input type="text" class="form-control" name="id_number" required></div>
        <input type="date" name="birth_date" value="{{ insured.birth_date.strftime('%Y-%m-%d') if insured and insured.birth_date else '' }}">
        <div class="mb-2"><label>שם אב</label><input type="text" class="form-control" name="father_name"></div>
        <div class="mb-2"><label>עיר</label><input type="text" class="form-control" name="city"></div>
        <div class="mb-2"><label>כתובת</label><input type="text" class="form-control" name="address"></div>
        <div class="mb-2"><label>טלפון</label><input type="text" class="form-control" name="phone"></div>
        <div class="mb-2"><label>קופה</label><input type="text" class="form-control" name="koopa"></div>
        <div class="mb-2"><label>מרפאה</label><input type="text" class="form-control" name="clinic"></div>

        <!-- Claim section -->
        <hr>
        <div class="mb-2">
          <label for="received_date" class="form-label">תאריך קבלה</label>
          <input type="date" id="received_date" name="received_date" class="form-control" value="{{ current_date }}" required>
        </div>
        <div class="mb-2"><label>מספר תביעה</label><input type="text" class="form-control" name="claim_number"></div>

        <div class="mb-2">
<!-- Correct: סוג תביעה -->
<label for="claim_type" class="form-label">סוג תביעה</label>
<select id="claim_type" name="claim_type" class="form-select" required>
  <option value="סיעוד" {% if not insured or insured.claim_type == 'סיעוד' %}selected{% endif %}>סיעוד</option>
  <option value="אכא" {% if insured and insured.claim_type == 'אכא' %}selected{% endif %}>אכא</option>
  <option value="ביטוח" {% if insured and insured.claim_type == 'ביטוח' %}selected{% endif %}>ביטוח</option>
</select>

        </div>

        <div class="mb-2">
          <label for="status" class="form-label">סטטוס תביעה</label>
          <select id="status" name="status" class="form-select" required>
            <option value="פתוחה" {% if not insured or insured.status == 'פתוחה' %}selected{% endif %}>פתוחה</option>
            <option value="הושלמה" {% if insured and insured.status == 'הושלמה' %}selected{% endif %}>הושלמה</option>
          </select>
        </div>

        <div class="mb-2">
          <!-- Correct: ביטוח -->
          <label for="insurance" class="form-label">ביטוח</label>
          <select id="insurance" name="insurance" class="form-select" required>
            <option value="הפניקס" {% if not insured or insured.insurance == 'הפניקס' %}selected{% endif %}>הפניקס</option>
            <option value="מנורה" {% if insured and insured.insurance == 'מנורה' %}selected{% endif %}>מנורה</option>
            <option value="שלמה" {% if insured and insured.insurance == 'שלמה' %}selected{% endif %}>שלמה</option>
          </select>
        </div>

        <div class="mb-2">
          <label for="notes" class="form-label">הערות</label>
          <textarea id="notes" name="notes" class="form-control" rows="3"></textarea>
        </div>

        <div class="d-grid mt-3">
          <button type="submit" class="btn btn-success">שמור</button>
          <a href="{{ url_for('main.admin_insured') }}" class="btn btn-secondary mt-2">חזור</a>
        </div>
      </div>
    </div>

    <!-- RIGHT: Placeholder cards (8 columns) -->
    <div class="col-md-8">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="card p-3 text-center">Medical Documents</div>
        </div>
        <div class="col-md-6">
          <div class="card p-3 text-center">Number of follow-up days</div>
        </div>
        <div class="col-md-6">
          <div class="card p-3 text-center">Money invested</div>
        </div>
        <div class="col-md-6">
          <div class="card p-3 text-center">Investigators (Pie Chart)</div>
        </div>
      </div>
    </div>
  </div>
</form>


<script>
  function getQueryParams() {
    const params = {};
    window.location.search.substring(1).split("&").forEach(function (pair) {
      const [key, value] = pair.split("=");
      if (key) {
        params[decodeURIComponent(key)] = decodeURIComponent((value || "").replace(/\+/g, ' '));
      }
    });
    return params;
  }


  document.addEventListener("DOMContentLoaded", function () {
    const params = getQueryParams();
    if (params.status && params.message) {
      if (params.status === 'success') {
        alert("✅ " + params.message);
      } else {
        alert("❌ " + params.message);
      }

      // Remove query params to prevent repeat alert
      const url = new URL(window.location);
      url.search = "";
      window.history.replaceState({}, document.title, url);
    }
  });
</script>



</body>
</html>
