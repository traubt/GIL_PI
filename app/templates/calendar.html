{% extends "base.html" %}
{% block content %}
  {% include 'header-bar.html' %}
  {% include 'side-bar.html' %}

<main id="main" class="main">

  <div class="pagetitle">
    <h1>לוח ארועים</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">ראשי</a></li>
        <li class="breadcrumb-item active">לוח ארועים</li>
      </ol>
    </nav>
  </div><!-- End Page Title -->

  <section class="section dashboard">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">ניהול ארועים</h5>
            <div id="calendar"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

</main><!-- End #main -->

<!-- FullCalendar CSS/JS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
  #calendar {
    max-width: 100%;
    margin: 0 auto;
    padding: 10px;
  }
  .fc {
    direction: rtl;   /* enforce RTL layout */
  }
</style>

{% include 'appointment_modal.html' %}

<script>
document.addEventListener('DOMContentLoaded', function () {
  var calendarEl = document.getElementById('calendar');

  var calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'he',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,timeGridDay'
    },
    events: function (fetchInfo, successCallback, failureCallback) {
      $.ajax({
        url: '/appointments/all',
        method: 'GET',
        success: function (data) {
          console.log("All appointments from server:", data);

          const events = data.map(appt => {
            // build ISO datetime: YYYY-MM-DDTHH:MM
            const start = appt.appointment_date && appt.time_from
              ? `${appt.appointment_date}T${appt.time_from}`
              : appt.appointment_date;

            const end = appt.appointment_date && appt.time_to
              ? `${appt.appointment_date}T${appt.time_to}`
              : null;

              return {
                id: appt.id,
                title: appt.title,   // ✅ use backend-built title
                start: start,
                end: end,
                extendedProps: {
                  status: appt.status,
                  address: appt.address,
                  notes: appt.notes
                }
              };

          });

          console.log("Mapped events for calendar:", events);
          successCallback(events);
        },
        error: function (err) {
          console.error("Error fetching appointments:", err);
          failureCallback(err);
        }
      });
    },
    selectable: true
  });

  calendar.render();
});
</script>




{% endblock %}
