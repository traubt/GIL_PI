{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6" dir="rtl" style="text-align: right;">
    <h2 style="text-align: right;">הרשמה</h2>
    <form method="POST" action="{{ url_for('main.register_post') }}">
      <div class="form-group">
        <label for="username">שם משתמש</label>
        <input type="text" class="form-control" id="username" name="username" required style="text-align: right;">
      </div>
      <div class="form-group">
        <label for="password">סיסמה</label>
        <input type="password" class="form-control" id="password" name="password" required style="text-align: right;">
      </div>
      <div class="form-group">
        <label for="first_name">שם פרטי</label>
        <input type="text" class="form-control" id="first_name" name="first_name" required style="text-align: right;">
      </div>
      <div class="form-group">
        <label for="last_name">שם משפחה</label>
        <input type="text" class="form-control" id="last_name" name="last_name" required style="text-align: right;">
      </div>
      <div class="form-group">
        <label for="email">אימייל</label>
        <input type="email" class="form-control" id="email" name="email" required style="text-align: right;">
      </div>

      <!-- Hidden default Shop -->
      <input type="hidden" name="shop" value="Head Office">

      <!-- Hidden default Role -->
      <input type="hidden" name="role" value="Admin">

      <button type="submit" class="btn btn-primary">הרשמה</button>
    </form>
  </div>
</div>

{% endblock %}
