
<div class="modal fade" id="appointmentsModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">

<div class="modal-header">
  <h4 class="modal-title w-100 text-center fw-bold" id="appointmentsModalTitle"></h4>
  <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>


      <div class="modal-body">

                <!-- 👇 Custom CSS for highlight -->
        <style>
          /* highlight selected row */
          #appointmentsTable tr.table-active {
              background-color: #d4edda !important; /* light green */
              color: #155724; /* dark green text */
          }

          /* highlight row on hover */
          #appointmentsTable tbody tr:hover {
              background-color: #eafaf1 !important; /* very light green */
              cursor: pointer;
          }
        </style>
        <!-- Section 1: Events -->
        <h5 class="fw-bold mb-3">ארוע/ים</h5>
        <table id="appointmentsTable" class="table table-striped">
          <thead>
            <tr>
              <th>תאריך</th>
              <th>טווח שעות</th>
              <th>חוקר/ים</th>
              <th>כתובת</th>
              <th>הערות</th>
              <th>סטטוס</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>



        <hr>

        <!-- Section 2: Event details -->
        <h5 class="fw-bold mt-4 mb-3">פרטי ארוע</h5>
        <form id="appointmentForm" style="display: none;">
          <input type="hidden" id="appointment_id" name="id">
          <input type="hidden" id="appointment_case_id" name="case_id">

          <div class="row mb-3">
            <div class="col-md-3">
              <label for="appointment_date" class="form-label">תאריך</label>
              <input type="date" id="appointment_date" name="appointment_date" class="form-control">
            </div>
            <div class="col-md-3">
              <label for="time_from" class="form-label">משעה</label>
              <input type="time" id="time_from" name="time_from" class="form-control">
            </div>
            <div class="col-md-3">
              <label for="time_to" class="form-label">עד שעה</label>
              <input type="time" id="time_to" name="time_to" class="form-control">
            </div>
            <div class="col-md-3">
              <label for="status" class="form-label">סטטוס</label>
              <select id="status" name="status" class="form-select">
                <option value="נוצר">נוצר</option>
                <option value="באישור">באישור</option>
                <option value="אושר">אושר</option>
                <option value="נדחה">נדחה</option>
                <option value="הושלם">הושלם</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="place" class="form-label">מקום</label>
              <input type="text" id="place" name="place" class="form-control">
            </div>
            <div class="col-md-6">
              <label for="doctor" class="form-label">רופא</label>
              <input type="text" id="doctor" name="doctor" class="form-control">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="koopa" class="form-label">קופה</label>
              <select id="koopa" name="koopa" class="form-select">
                <option value="">בחר קופה...</option>
                {% for k in koopa_list %}
                  <option value="{{ k.koopa_name }}">{{ k.koopa_name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label for="address" class="form-label">כתובת</label>
              <input type="text" id="address" name="address" class="form-control">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-4">
              <label for="investigator_id_1" class="form-label">חוקר 1</label>
              <select id="investigator_id_1" name="investigator_id_1" class="form-select">
                <option value="">בחר...</option>
                {% for inv in investigators %}
                  <option value="{{ inv.id }}">{{ inv.full_name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label for="investigator_id_2" class="form-label">חוקר 2</label>
              <select id="investigator_id_2" name="investigator_id_2" class="form-select">
                <option value="">בחר...</option>
                {% for inv in investigators %}
                  <option value="{{ inv.id }}">{{ inv.full_name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label for="investigator_id_3" class="form-label">חוקר 3</label>
              <select id="investigator_id_3" name="investigator_id_3" class="form-select">
                <option value="">בחר...</option>
                {% for inv in investigators %}
                  <option value="{{ inv.id }}">{{ inv.full_name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-12">
              <label for="notes" class="form-label">הערות</label>
              <textarea id="notes" name="notes" class="form-control"></textarea>
            </div>
          </div>

        </form>
      </div>

      <div class="modal-footer d-flex justify-content-end gap-2 flex-row-reverse">
        <button id="newAppointment" class="btn btn-warning">ארוע חדש</button>
        <button id="googleCalendar" class="btn btn-secondary" disabled>Google Calendar</button>
        <button id="deleteAppointment" class="btn btn-danger" disabled>מחק</button>
        <button id="saveAppointment" type="submit" form="appointmentForm" class="btn btn-success" disabled>שמור ארוע</button>
      </div>

    </div>
  </div>
</div>

<!-- Toast container -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
  <div id="toastMessage" class="toast align-items-center text-white bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>
