<div id="lifeFollowupPhotoCard" class="card mb-3">
  <div class="card-header d-flex justify-content-between align-items-center">
      <span class="label-strong">תמונות למעקב ביטוח חיים</span>
<button type="button"
        class="btn btn-sm btn-outline-primary"
        id="btnLoadLifeFollowupPhotos">
    טען תמונות
</button>

  </div>

  <div class="card-body" id="lifeFollowupPhotoContainer">
      <div class="text-muted small">לא נטענו תמונות.</div>
  </div>
</div>

<input type="file"
       id="lifeFollowupLocalInput"
       multiple
       accept=".jpg,.jpeg,.png,.webp"
       style="display:none;">
