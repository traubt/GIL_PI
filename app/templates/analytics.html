  <script>

    function formatLocalDateTime(value) {
      if (!value) return '';

      const date = new Date(value);
      if (isNaN(date.getTime())) return value;

      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear();

      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');

      // If time is 00:00, show only date
      if (hours === '00' && minutes === '00') {
        return `${day}-${month}-${year}`;
      }

      return `${day}-${month}-${year} ${hours}:${minutes}`;
    }

    function isDateColumn(title) {
      const dateKeywords = ['תאריך', 'date', 'due_date', 'created', 'modified'];
      const lower = String(title || '').toLowerCase();
      return dateKeywords.some(k => lower.includes(k.toLowerCase()));
    }


    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function setDefaultDates(daysBack = 30) {
      const today = new Date();
      const from = new Date();
      from.setDate(today.getDate() - daysBack);

      $('#fromDate').datepicker('update', formatDate(from));
      $('#toDate').datepicker('update', formatDate(today));
    }

    function showSpinner() {
      $('#spinnerOverlay').css('display', 'flex');
    }

    function hideSpinner() {
      $('#spinnerOverlay').hide();
    }

    function destroyTableIfExists() {
      if ($.fn.DataTable.isDataTable('#analytics_report_tbl')) {
        $('#analytics_report_tbl').DataTable().clear().destroy();
      }
      $('#analytics_report_tbl thead').empty();
      $('#analytics_report_tbl tbody').empty();
    }

function renderAnalyticsTable(response, reportType) {
  destroyTableIfExists();

  const table = $('#analytics_report_tbl');
  table.empty();

  const thead = $('<thead></thead>');
  const headerRow = $('<tr></tr>');
  const filterRow = $('<tr class="filters-row"></tr>');

  response.columns.forEach(col => {
    headerRow.append(`<th>${col.title}</th>`);
    filterRow.append(`
      <th>
        <input type="text"
               placeholder="חיפוש ${col.title}"
               data-column="${col.title}">
      </th>
    `);
  });

  thead.append(headerRow);
  thead.append(filterRow);

  table.append(thead);
  table.append('<tbody></tbody>');
  table.show();
  $('#emptyState').hide();

  const dt = table.DataTable({
    data: response.data,
    columns: response.columns.map(col => ({
      data: col.title,
      defaultContent: '',
      render: function (data, type, row) {
        if (isDateColumn(col.title)) {
          return formatLocalDateTime(data);
        }
        return data ?? '';
      }
    })),
    dom: 'Bfrtip',
    buttons: [
      {
        extend: 'excelHtml5',
        text: 'Download To Excel',
        title: `${reportType}_${new Date().toISOString().slice(0, 10)}`
      }
    ],
    fixedHeader: true,
    orderCellsTop: true,
    pageLength: 50,
    lengthMenu: [
      [25, 50, 100, 200],
      [25, 50, 100, 200]
    ],
    language: {
      search: "חיפוש כללי:",
      lengthMenu: "הצג _MENU_ רשומות",
      info: "מציג _START_ עד _END_ מתוך _TOTAL_ רשומות",
      infoEmpty: "אין רשומות להצגה",
      zeroRecords: "לא נמצאו תוצאות",
      paginate: {
        first: "ראשון",
        last: "אחרון",
        next: "הבא",
        previous: "קודם"
      }
    },
    initComplete: function () {
      const api = this.api();

      api.columns().every(function (index) {
        const column = this;

        $('thead tr.filters-row th:eq(' + index + ') input', table).on('keyup change', function () {
          const searchTerm = this.value.trim();
          if (column.search() !== searchTerm) {
            column.search(searchTerm).draw();
          }
        });
      });
    }
  });

  $('#reportMeta').text(`הוחזרו ${response.data.length} רשומות עבור "${reportType}"`);
}

    function runAnalyticsReport() {
      const reportType = $('input[name="analyticsReport"]:checked').val();
      const fromDate = $('#fromDate').val();
      const toDate = $('#toDate').val();

      if (!reportType || !fromDate || !toDate) {
        alert('נא לבחור דוח וטווח תאריכים');
        return;
      }

      showSpinner();

      $.ajax({
        url: '/get_analytics_report',
        method: 'GET',
        data: {
          reportType: reportType,
          fromDate: fromDate,
          toDate: toDate
        },
        success: function (response) {
          if (response.columns && response.data) {
            renderAnalyticsTable(response, reportType);

            if (response.data.length === 0) {
              destroyTableIfExists();
              $('#analytics_report_tbl').hide();
              $('#emptyState').show();
              $('#reportMeta').text(`לא נמצאו נתונים עבור "${reportType}"`);
            }
          } else {
            destroyTableIfExists();
            $('#analytics_report_tbl').hide();
            $('#emptyState').show();
            $('#reportMeta').text('לא התקבלו נתונים מהשרת');
          }
        },
        error: function (xhr) {
          console.error('Analytics report error:', xhr);
          alert('אירעה שגיאה בעת טעינת הדוח');
        },
        complete: function () {
          hideSpinner();
        }
      });
    }

    $(document).ready(function () {
      $('.datepicker').datepicker({
        format: 'yyyy-mm-dd',
        autoclose: true,
        todayHighlight: true,
        rtl: true
      });

      setDefaultDates(30);
      $('#emptyState').show();

      $('#runReport').on('click', function () {
        runAnalyticsReport();
      });

      $('.quick-range').on('click', function () {
        const days = parseInt($(this).data('range'), 10);
        setDefaultDates(days);
      });
    });
  </script>
